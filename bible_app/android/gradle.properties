org.gradle.jvmargs=-Xmx4096M -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# Соответствует `flutter build ... --android-skip-build-dependency-validation`: не печатать
# предупреждение про minSdk 23 (намеренно для старых устройств). Отключает и прочие проверки
# версий Gradle/Java/AGP в Flutter-плагине — при отладке сборки временно закомментируйте.
skipDependencyChecks=true
